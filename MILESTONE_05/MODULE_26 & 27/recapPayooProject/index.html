<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- css link cdn -->
    <link rel="stylesheet" href="styles/style.css" />

    <!-- daisy UI and tailwind cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-[#F4F5F7] h-[100vh] flex justify-center items-center flex-col outfit"
  >
    <div
      class="h-[130px] w-[280px] bg-[url(./assets/bg.png)] bg-cover flex justify-center items-center"
    >
      <img src="assets/Group.png" alt="" />
    </div>
    <form class="w-[350px] bg-white rounded-[24px] p-8">
      <div>
        <label class="font-semibold">Mobile Number</label>
        <br />
        <input
          id="mobile-number"
          type="text"
          placeholder="Enter your number"
          class="input bg-[#F4F5F7] mt-2 rounded-[32px]"
        />
      </div>
      <div class="mt-5">
        <label class="font-semibold">4 Digit Pin</label>
        <br />
        <input
          id="pin-number"
          type="text"
          placeholder="Enter 4 digit pin"
          class="input bg-[#F4F5F7] mt-2 rounded-[32px]"
        />
      </div>
      <button
        id="loginButton"
        class="btn text-white mt-5 w-full rounded-[32px] bg-[#0874F2] font-semibold text-[20px]"
      >
        Login
      </button>
    </form>

    <script src="./index.js"></script>
  </body>
</html>
